version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seliv_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seliv_network
    restart: unless-stopped
    # Pas de port exposé en prod — accès uniquement depuis le réseau Docker interne

  redis:
    image: redis:7-alpine
    container_name: seliv_redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seliv_network
    restart: unless-stopped
    # Pas de port exposé en prod

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seliv_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL}
      FRONTEND_URL: ${FRONTEND_URL}
      NODE_ENV: production
      PORT: 4000
      DB_SYNC: ${DB_SYNC:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seliv_network
    restart: unless-stopped
    # Pas de port exposé en prod — nginx proxy vers backend:4000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* sont "baked" au build time dans Next.js
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    container_name: seliv_frontend
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      NODE_ENV: production
      ACCESS_CODE: ${ACCESS_CODE:-}
    depends_on:
      - backend
    networks:
      - seliv_network
    restart: unless-stopped
    # Pas de port exposé en prod — nginx proxy vers frontend:3000

  nginx:
    image: nginx:alpine
    container_name: seliv_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.prod:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - seliv_network
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: seliv_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Ce container ne tourne pas en permanence — appelé manuellement pour obtenir/renouveler le certificat
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'

volumes:
  postgres_data:
  redis_data:

networks:
  seliv_network:
    driver: bridge
