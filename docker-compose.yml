version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: seliv_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seliv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seliv_password}
      POSTGRES_DB: ${POSTGRES_DB:-seliv_db}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-seliv} -d ${POSTGRES_DB:-seliv_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seliv_network

  redis:
    image: redis:7-alpine
    container_name: seliv_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seliv_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seliv_backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-seliv}:${POSTGRES_PASSWORD:-seliv_password}@postgres:5432/${POSTGRES_DB:-seliv_db}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_placeholder}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@seliv.fr}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 4000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seliv_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: seliv_frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-change-me-in-production}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      ACCESS_CODE: ${ACCESS_CODE:-}
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - seliv_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: seliv_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    depends_on:
      - frontend
      - backend
    networks:
      - seliv_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  seliv_network:
    driver: bridge
